<!DOCTYPE html>
<html>
<head>
    <title>HPD - Evidence Summit Check-In System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body{
            margin:0;
            padding:0;
            overflow-x:hidden;
            font-family:Arial, sans-serif;
        }

        .bg-video{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-2;
        }

        .video-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.55);
            z-index:-1;
        }

        .logo{
            width:140px;
            display:block;
            margin:0 auto 20px auto;
            background:white;
            padding:10px;
            border-radius:12px;
        }

        .checkin-card{
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(10px);
            border-radius:20px;
            border:none;
        }

        .title{
            color:#006b3f;
            font-weight:bold;
        }

        #reader{
            width:100%;
        }

        .container{
            position:relative;
            z-index:10;
        }
    </style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline class="bg-video">
    <source src="snmmc2026.mp4" type="video/mp4">
</video>

<div class="video-overlay"></div>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card checkin-card shadow p-4">

                <div class="text-center">
                    <img src="LOGO.png" class="logo">
                </div>

                <h3 class="text-center title">
                    2026 Health Promotion Division Evidence Summit
                </h3>

                <h3 class="text-center title">
                    Check-In
                </h3>

                <hr>

                <!-- MODE -->
                <div class="btn-group w-100 mb-3">
                    <button class="btn btn-primary" onclick="showManual()">Registration Code</button>
                    <!--button class="btn btn-success" onclick="showScanner()">Scan QR</button-->
                </div>

                <!-- MANUAL -->
                <div id="manualSection">

                    <input
                        id="code"
                        class="form-control"
                        placeholder="Enter last 5 digits e.g. 00049"
                        maxlength="5"
                        inputmode="numeric"
                    >

                    <button onclick="checkInManual()" class="btn btn-primary w-100 mt-2">
                        Check In
                    </button>

                </div>

                <!-- QR 
                <div id="scannerSection" style="display:none;">
                    <div id="reader"></div>
                </div>-->

                <!-- RESULT -->
                <div id="result" class="mt-3"></div>

            </div>

        </div>
    </div>

</div>

<script>

const BASE_URL =
"https://script.google.com/macros/s/AKfycbxFblsCiOPgHBd7bs_n9Jjo6EV25nVwfL3WNWShaGL6ZQpUVTcHnifRasD6Ss90xZT_xA/exec";

/* --------------------
   INPUT FILTER (numbers only)
-------------------- */
document.getElementById("code").addEventListener("input", function(){
    this.value = this.value.replace(/[^0-9]/g, "");
});

/* --------------------
   MODE SWITCH
-------------------- */
function showManual(){
    document.getElementById("manualSection").style.display = "block";
    document.getElementById("scannerSection").style.display = "none";
}

function showScanner(){
    document.getElementById("manualSection").style.display = "none";
    document.getElementById("scannerSection").style.display = "block";
}

/* --------------------
   MANUAL CHECKIN
-------------------- */
function checkInManual(){

    let shortCode = document.getElementById("code").value.trim();

    if(!shortCode){
        alert("Enter last 5 digits of code");
        return;
    }

    if(shortCode.length !== 5){
        alert("Code must be exactly 5 digits");
        return;
    }

    // 👉 ADD PREFIX HERE
    const fullCode = "HPD-ES-2026-" + shortCode;

    processCheckIn(fullCode);
}

/* --------------------
   PROCESS CHECKIN
-------------------- */
async function processCheckIn(code){

    try{

        const response = await fetch(
            BASE_URL + "?code=" + encodeURIComponent(code)
        );

        const data = await response.json();

        if(data.status === "success"){

            document.getElementById("result").innerHTML = `

            <div class="alert alert-success">

                <h4>✔ Check-In Successful</h4>

                <hr>

                <p>
                <b>Name:</b> ${data.name}
                </p>


                <p>
                <b>Position:</b> ${data.position}
                </p>


                <p>
                <b>Region:</b> ${data.region}
                </p>


                <p>
                <b>District:</b> ${data.district}
                </p>


                <p>
                <b>Registration Code:</b> ${data.regCode}
                </p>


            </div>

            `;
        }

        else if(data.status === "already"){

            document.getElementById("result").innerHTML = `
            <div class="alert alert-warning">
                <h5>⚠ Already Checked In</h5>
            </div>`;
        }

        else{

            document.getElementById("result").innerHTML = `
            <div class="alert alert-danger">
                <h5>❌ Invalid Code</h5>
            </div>`;
        }

    }
    catch(err){

        document.getElementById("result").innerHTML = `
        <div class="alert alert-danger">
            <h5>⚠ Network Error</h5>
        </div>`;
    }
}

</script>

</body>
</html>
